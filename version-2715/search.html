<head>
  <meta charset="UTF-8">

<title>全站搜索 - 国剧热播</title>

  <meta name="keywords" content="全站搜索,影片搜索,剧名搜索,地区筛选,题材筛选">
  <meta name="theme-color" content="#07111f">
  <link rel="stylesheet" href="./assets/styles.css">

<body class="">
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="./index.html" aria-label="回到首页">
      <span class="brand-mark">国</span>
      <span>
        <strong>国剧热播</strong>
        <small>高清剧集大全</small>
      </span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">☰</button>
    <nav id="site-nav" class="nav-links">
      <a href="./index.html">首页</a>
      <a href="./categories.html">分类</a>
      <a href="./rank.html">排行</a>

<main class="shell">
  <section class="container page-banner">
    <div class="crumbs"><a href="index.html">首页</a> / 全站搜索</div>
    <h1>全站搜索</h1>
    <p>输入剧名、地区、类型或标签即可检索全部影片。这里会动态加载全站影片摘要数据。</p>
  </section>

  <section class="container search-shell">
    <form class="search-tools" data-search-form>
      <input class="input" type="search" name="keyword" placeholder="关键词：剧名、地区、标签、简介">
      <input class="input" type="text" name="region" placeholder="地区筛选：如 中国大陆、日本、美国">
      <input class="input" type="text" name="type" placeholder="类型筛选：如 电影、剧集、电视剧">
      <input class="input" type="text" name="genre" placeholder="题材筛选：如 悬疑、爱情、动作">
    </form>
    <div class="search-results-head">
      <div>结果：<strong data-search-count>0 条结果</strong></div>
      <div>最多展示前 240 条命中结果</div>
    </div>
    <div class="card-grid" data-search-results></div>
    <div class="search-empty" data-search-empty style="display:none;">没有匹配的内容，尝试换一个关键词。</div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div>国剧热播 · 纯静态影视站点</div>
    <div style="margin-top:8px;">支持分类浏览、搜索筛选、热播排行与影片详情内链。</div>
  </div>
</footer>
